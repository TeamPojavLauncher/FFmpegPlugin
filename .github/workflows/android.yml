name: Android CI

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest
    env:
      FFMPEG_PLUGIN_KEYSTORE_PASSWORD: ${{ secrets.FFMPEG_PLUGIN_KEYSTORE_PASSWORD }}
    steps:
    - uses: actions/checkout@v3
    - name: set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build with Gradle
      run: |
        sudo apt install nasm autogen
        ./scripts/setup_environ.sh
        ./scripts/build_libs.sh
        ./gradlew assembleRelease
        ./gradlew bundleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/app-release.apk
    
    - name: Rename APK
      run: mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/Pojav-ffmpeg-plugin.apk
        
    - name: Release APK
      uses: softprops/action-gh-release@v1
      with:
        tag_name: rel
        name: Pojav FFmpeg Plugin
        body: |
          This plugin is required for rendering Replay mod videos. After a year of being abandoned, it has finally been updated. Please upgrade to the latest version.
          
          [!NOTE]
          This plugin is not related to PojavLauncherTeam. It is just a fork with updated changes.
        files: |
          app/build/outputs/apk/release/Pojav-ffmpeg-plugin.apk

    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: app-release-aab
        path: app/build/outputs/bundle/release/app-release.aab
